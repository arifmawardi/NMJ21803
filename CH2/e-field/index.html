<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Field Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; /* Tailwind slate-900 */
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: none; /* Prevent scroll on touch devices */
        }
        #canvas-container {
            position: relative;
            width: 100%;
            height: calc(100vh - 80px);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Custom radio button styling */
        .charge-toggle input:checked + div {
            border-color: #38bdf8;
            background-color: rgba(56, 189, 248, 0.1);
        }
        .charge-toggle-neg input:checked + div {
            border-color: #f43f5e;
            background-color: rgba(244, 63, 94, 0.1);
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Top Control Bar -->
    <div id="toolbar" class="h-[80px] bg-slate-800 border-b border-slate-700 flex items-center justify-between px-4 sm:px-6 shadow-md z-10">
        <div class="flex-1">
            <h1 class="text-lg sm:text-xl font-bold text-sky-400">Electric Field Simulation</h1>
            <p class="text-xs sm:text-sm text-slate-400 hidden sm:block">E-field points Right (→). Strength peaks in the center.</p>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Charge Selection -->
            <div class="flex items-center gap-2 bg-slate-900 p-1 rounded-lg">
                <label class="charge-toggle cursor-pointer relative">
                    <input type="radio" name="chargeType" value="1" checked class="peer sr-only">
                    <div class="px-3 py-1.5 rounded-md border-2 border-transparent text-sm font-medium text-sky-400 hover:bg-slate-800 transition-all flex items-center gap-1">
                        <span class="text-lg leading-none">+</span> Positive
                    </div>
                </label>
                
                <label class="charge-toggle-neg cursor-pointer relative">
                    <input type="radio" name="chargeType" value="-1" class="peer sr-only">
                    <div class="px-3 py-1.5 rounded-md border-2 border-transparent text-sm font-medium text-rose-400 hover:bg-slate-800 transition-all flex items-center gap-1">
                        <span class="text-lg leading-none">-</span> Negative
                    </div>
                </label>
            </div>

            <button id="clearBtn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm font-semibold transition-colors">
                Clear
            </button>
        </div>
    </div>

    <!-- Simulation Canvas -->
    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
        <div class="absolute bottom-4 left-4 text-xs text-slate-500 pointer-events-none">
            Tip: A positive charge continues to speed up as long as it's in the field, even as the field strength drops.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        const chargeRadios = document.getElementsByName('chargeType');

        let width, height;
        let particles = [];
        
        // Physics constants
        const E_MAX_ACCEL = 0.1; // Maximum acceleration from the E-field at the center (reduced to slow down)
        const PARTICLE_RADIUS = 12;

        // Initialize and handle resizing
        function resize() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            width = canvas.width;
            height = canvas.height;
        }

        window.addEventListener('resize', resize);
        resize(); // Initial sizing

        // Get normalized Electric Field magnitude (0.0 to 1.0) based on x position
        function getEFieldMagnitude(x) {
            const center = width / 2;
            // Linear decrease from center (1.0) to edges (0.0)
            const normalized = 1 - (Math.abs(x - center) / center);
            // Clamp between 0 and 1
            return Math.max(0, Math.min(1, normalized));
        }

        // Draw the electric field vectors (arrows)
        function drawEField() {
            const spacingX = 60;
            const spacingY = 60;
            const arrowMaxLen = 45;

            // Draw magnitude graph at the bottom as a faint visual guide
            ctx.beginPath();
            ctx.moveTo(0, height);
            ctx.lineTo(width / 2, height - 100);
            ctx.lineTo(width, height);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.fill();

            // Draw vector field
            for (let x = spacingX / 2; x < width; x += spacingX) {
                let mag = getEFieldMagnitude(x);
                
                // Ensure there's a tiny baseline field so arrows don't disappear completely
                let visualMag = mag < 0.1 ? 0.1 : mag; 
                const arrowLen = visualMag * arrowMaxLen;
                
                // Color intensity based on magnitude (Neon Green)
                ctx.strokeStyle = `rgba(57, 255, 20, ${visualMag * 0.7 + 0.1})`;
                ctx.lineWidth = 2;

                for (let y = spacingY / 2; y < height; y += spacingY) {
                    drawArrow(x - arrowLen/2, y, x + arrowLen/2, y);
                }
            }
        }

        function drawArrow(fromX, fromY, toX, toY) {
            const headlen = 6;
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        }

        class Particle {
            constructor(x, y, q) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0; // Moves only in X, but kept for future proofing
                this.q = q;  // Charge: +1 or -1
                this.history = [];
            }

            update() {
                // 1. Calculate Force/Acceleration based on local E-field
                // F = qE. Assuming mass m=1, a = qE
                const mag = getEFieldMagnitude(this.x);
                const acceleration = this.q * (mag * E_MAX_ACCEL);
                
                // 2. Update Velocity
                this.vx += acceleration;
                
                // 3. Update Position
                this.x += this.vx;

                // 4. Record history for the motion trail
                this.history.push({x: this.x, y: this.y});
                if (this.history.length > 40) {
                    this.history.shift();
                }
            }

            draw() {
                // Draw trail
                if (this.history.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.history[0].x, this.history[0].y);
                    for (let i = 1; i < this.history.length; i++) {
                        ctx.lineTo(this.history[i].x, this.history[i].y);
                    }
                    ctx.strokeStyle = this.q > 0 ? 'rgba(56, 189, 248, 0.4)' : 'rgba(244, 63, 94, 0.4)';
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // Draw Particle Body
                ctx.beginPath();
                ctx.arc(this.x, this.y, PARTICLE_RADIUS, 0, Math.PI * 2);
                ctx.fillStyle = this.q > 0 ? '#0ea5e9' : '#e11d48'; // Tailwind sky-500 : rose-600
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw Plus/Minus Sign
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Slight adjustment for better visual centering
                ctx.fillText(this.q > 0 ? '+' : '-', this.x, this.y + 1);
            }

            // Check if particle has left the canvas entirely
            isOffScreen() {
                return (this.x < -100 || this.x > width + 100);
            }
        }

        // Animation Loop
        function animate() {
            // Clear canvas
            ctx.fillStyle = '#0f172a'; // Match body background
            ctx.fillRect(0, 0, width, height);

            // Draw environment
            drawEField();

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();

                // Clean up memory if particle goes off-screen
                if (p.isOffScreen()) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        // Input Handling
        function addParticle(x, y) {
            // Determine selected charge
            let charge = 1;
            for (const radio of chargeRadios) {
                if (radio.checked) {
                    charge = parseInt(radio.value);
                    break;
                }
            }
            particles.push(new Particle(x, y, charge));
        }

        // Mouse click
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addParticle(x, y);
        });

        // Touch event for mobile support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent scrolling while touching canvas
            const rect = canvas.getBoundingClientRect();
            const touches = e.changedTouches;
            for(let i=0; i<touches.length; i++) {
                const x = touches[i].clientX - rect.left;
                const y = touches[i].clientY - rect.top;
                addParticle(x, y);
            }
        }, { passive: false });

        // Clear button
        clearBtn.addEventListener('click', () => {
            particles = [];
        });

        // Start loop
        animate();
    </script>
</body>
</html>
